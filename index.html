<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Noorzia! ♾️❤️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; font-family: 'Poppins', sans-serif; background-color: #120813; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .stage-view { display: none; width: 100%; height: 100%; align-items: center; justify-content: center; flex-direction: column; }
        .stage-view.active { display: flex; }

        /* Mobile-Safe Lock Screen */
        #lock-screen { background: linear-gradient(135deg, #bc263d 0%, #3a0710 100%); }
        .lock-container { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 5px; }
        .polaroid-lock-frame { background: white; padding: 8px 8px 24px 8px; width: 160px; transform: rotate(-2deg); }
        .polaroid-lock-frame img { width: 100%; height: 140px; object-fit: cover; }
        .keypad-panel { width: 260px; }
        .grid-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        .key { background: rgba(255,255,255,0.1); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .passcode-dots { display: flex; gap: 15px; margin-bottom: 15px; }
        .dot { width: 12px; height: 12px; border: 2px solid white; border-radius: 50%; }
        .dot.active { background: white; }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://santoshumashankar15-byte.github.io/birthday-gift/music.mp3" type="audio/mpeg">
    </audio>

    <div id="lock-screen" class="stage-view active">
        <div class="lock-container">
            <div class="polaroid-lock-frame">
                <img src="pic1.jpg.jpg" alt="Photo">
                <div style="text-align:center; margin-top:5px; font-family:cursive;">Happy Birthday!</div>
            </div>
            <div class="keypad-panel">
                <div class="passcode-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                <div class="grid-pad">
                    <div class="key" onclick="tapKey('1')">1</div><div class="key" onclick="tapKey('2')">2</div><div class="key" onclick="tapKey('3')">3</div>
                    <div class="key" onclick="tapKey('4')">4</div><div class="key" onclick="tapKey('5')">5</div><div class="key" onclick="tapKey('6')">6</div>
                    <div class="key" onclick="tapKey('7')">7</div><div class="key" onclick="tapKey('8')">8</div><div class="key" onclick="tapKey('9')">9</div>
                    <div class="key" onclick="tapKey('✖')">✖</div><div class="key" onclick="tapKey('0')">0</div><div class="key">♾️</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PIN_KEY = "1306";
        let enteredPin = "";
        function tapKey(num) {
            const dots = document.querySelectorAll('.dot');
            const music = document.getElementById('bg-music');
            if(num === '✖') { enteredPin = ""; dots.forEach(d => d.className = 'dot'); return; }
            if(enteredPin.length < 4) {
                enteredPin += num;
                dots[enteredPin.length-1].className = 'dot active';
            }
            if(enteredPin.length === 4 && enteredPin === PIN_KEY) {
                music.play();
                // Redirect to the main experience
                window.location.href = "https://santoshumashankar15-byte.github.io/birthday-gift/";
                alert("Unlocked!");
            }
        }
    </script>
</body>
</html>
