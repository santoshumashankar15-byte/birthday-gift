<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    <style>
        body { margin: 0; background: #bc263d; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; }
        .screen { display: none; text-align: center; }
        .active { display: block; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .btn { padding: 20px; background: rgba(255,255,255,0.2); border-radius: 50%; cursor: pointer; }
        #envelope { width: 200px; cursor: pointer; }
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <div id="login" class="screen active">
        <h2>Enter Passcode</h2>
        <div class="keypad">
            <button class="btn" onclick="check(1)">1</button><button class="btn" onclick="check(3)">3</button><button class="btn" onclick="check(0)">0</button>
            <button class="btn" onclick="check(6)">6</button>
        </div>
    </div>

    <div id="stage2" class="screen">
        <img id="envelope" src="envelope.png" onclick="showGallery()">
        <p>Click the envelope!</p>
    </div>

    <div id="stage3" class="screen">
        <div class="gallery">
            <img src="pic1.jpg" width="100%">
            <img src="pic2.jpg" width="100%">
        </div>
        <button onclick="showCake()">Next</button>
    </div>

    <div id="stage4" class="screen">
        <h1>Make a Wish! 🎂</h1>
        <button onclick="alert('Happy Birthday!')">Blow out candles</button>
    </div>

    <audio id="music" src="music.mp3"></audio>

    <script>
        let pin = "";
        function check(n) {
            pin += n;
            if(pin === "1306") {
                document.getElementById('music').play();
                document.getElementById('login').classList.remove('active');
                document.getElementById('stage2').classList.add('active');
            }
        }
        function showGallery() {
            document.getElementById('stage2').classList.remove('active');
            document.getElementById('stage3').classList.add('active');
        }
        function showCake() {
            document.getElementById('stage3').classList.remove('active');
            document.getElementById('stage4').classList.add('active');
        }
    </script>
</body>
</html>
