<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Gift</title>
    <style>
        body { margin: 0; padding: 0; background: #120813; color: white; font-family: sans-serif; }
        /* The container forces everything to stay inside the screen */
        .page-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow-y: auto; padding: 10px; }
        .polaroid { background: white; color: black; padding: 10px; width: 140px; text-align: center; margin-bottom: 20px; }
        .polaroid img { width: 100%; height: 120px; object-fit: cover; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 200px; }
        .key { background: #333; padding: 15px; text-align: center; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="polaroid">
            <img src="pic1.jpg.jpg">
            <div>Happy Birthday!</div>
        </div>
        
        <div id="dots" style="margin-bottom:20px;">_ _ _ _</div>

        <div class="grid">
            <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
            <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
            <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
            <div class="key" onclick="press('✖')">✖</div><div class="key" onclick="press('0')">0</div><div class="key">♾️</div>
        </div>
    </div>

    <audio id="music" src="music.mp3"></audio>

    <script>
        let code = "";
        function press(n) {
            if(n === '✖') { code = ""; document.getElementById('dots').innerText = "_ _ _ _"; return; }
            code += n;
            document.getElementById('dots').innerText = "*".repeat(code.length);
            if(code === "1306") {
                document.getElementById('music').play();
                alert("It worked!"); // For testing
                // Once this works, you can add your other screens back
            }
        }
    </script>
</body>
</html>
