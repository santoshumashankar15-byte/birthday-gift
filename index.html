<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Noorzia! ♾️❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; min-height: 100%; font-family: 'Poppins', sans-serif; background-color: #120813; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }

        .bg-hearts { position: fixed; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .floating-heart { position: absolute; color: rgba(255, 117, 151, 0.15); font-size: 1.5rem; animation: floatUp 8s linear infinite; bottom: -50px; }
        @keyframes floatUp { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(-105vh) rotate(360deg); opacity: 0; } }

        .stage-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; flex-direction: column; opacity: 0; transition: opacity 0.8s ease; z-index: 2; }
        .stage-view.active { display: flex; opacity: 1; }

        /* Lock Screen - Mobile Optimized */
        #lock-screen { background: linear-gradient(135deg, #bc263d 0%, #3a0710 100%); }
        .lock-container { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 10px; width: 100%; }
        .polaroid-lock-frame { background: #ffffff; padding: 10px 10px 30px 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-radius: 4px; width: 180px; transform: rotate(-2deg); }
        .polaroid-lock-frame img { width: 100%; height: 150px; object-fit: cover; }
        .polaroid-caption { font-family: 'Dancing Script', cursive; color: #1a1a1a; font-size: 1.5rem; text-align: center; margin-top: 10px; }
        
        .keypad-panel { display: flex; flex-direction: column; align-items: center; width: 260px; }
        .passcode-dots { display: flex; gap: 15px; margin-bottom: 15px; }
        .dot { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.6); border-radius: 50%; }
        .dot.active { background-color: #fff; }
        .dot.error { border-color: #ff4d6d; background-color: #ff4d6d; }
        
        .grid-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        .key { background: rgba(255,255,255,0.1); color: #fff; font-size: 1.4rem; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        
        /* Other screens remain largely the same */
        #loading-screen { background: #120813; }
        .progress-bar-container { width: 250px; height: 6px; background: #333; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; background: #ff7597; transition: width 4s linear; }
        
        #envelope-screen, #timeline-screen, #cake-screen { background: radial-gradient(circle at center, #2c1218 0%, #000 100%); color: white; text-align: center; padding: 20px; }
        .envelope-wrapper { width: 300px; height: 200px; background: #b52b3f; margin: 20px auto; position: relative; cursor: pointer; }
        
        .action-btn { margin-top: 30px; padding: 10px 30px; background: #bc263d; color: white; border: none; border-radius: 20px; }
    </style>
</head>
<body>

    <audio id="bg-music" loop preload="auto" style="display: none;">
        <source src="https://santoshumashankar15-byte.github.io/birthday-gift/music.mp3" type="audio/mpeg">
    </audio>

    <div class="bg-hearts" id="hearts-container"></div>

    <div id="lock-screen" class="stage-view active">
        <div class="lock-container">
            <div class="polaroid-lock-frame">
                <img src="pic1.jpg.jpg" alt="Cover">
                <div class="polaroid-caption">Birthday!</div>
            </div>
            <div class="keypad-panel">
                <div class="passcode-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                <div class="grid-pad">
                    <div class="key" onclick="tapKey('1')">1</div><div class="key" onclick="tapKey('2')">2</div><div class="key" onclick="tapKey('3')">3</div>
                    <div class="key" onclick="tapKey('4')">4</div><div class="key" onclick="tapKey('5')">5</div><div class="key" onclick="tapKey('6')">6</div>
                    <div class="key" onclick="tapKey('7')">7</div><div class="key" onclick="tapKey('8')">8</div><div class="key" onclick="tapKey('9')">9</div>
                    <div class="key" onclick="tapKey('✖')">✖</div><div class="key" onclick="tapKey('0')">0</div><div class="key">♾️</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PIN_KEY = "1306";
        let enteredPin = "";
        
        function tapKey(num) {
            const dots = document.querySelectorAll('.dot');
            const music = document.getElementById('bg-music');
            
            if(num === '✖') { enteredPin = ""; dots.forEach(d => d.className = 'dot'); return; }
            if(enteredPin.length < 4) {
                enteredPin += num;
                dots[enteredPin.length-1].className = 'dot active';
            }
            if(enteredPin.length === 4 && enteredPin === PIN_KEY) {
                music.play();
                document.getElementById('lock-screen').style.display = 'none';
                alert("Correct! Now loading...");
            }
        }
    </script>
</body>
</html>
